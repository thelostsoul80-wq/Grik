<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok 6.91 | Remix Edition</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* إجبار الجسم عملء الشاشة ومنع الارتداد في iOS */
        html, body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            position: fixed;
        }

        /* حاوية مرنة تستجيب لارتفاع متصفح تلغرام */
        :root {
            --tg-viewport-height: 100vh;
        }

        .mobile-container {
            height: var(--tg-viewport-height);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 
            box-sizing: border-box;
            z-index: 20;
            padding: 40px 20px;
        }

        /* حاوية الفيديو الخلفية */
        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        #bgVideo {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.4) contrast(1.2);
        }

        /* حاوية المحتوى المركزي */
        .brand-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: auto;
            margin-bottom: auto;
            text-shadow: 0 0 30px rgba(110, 235, 54, 0.4);
        }

        .brand-top-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            /* جعل الصورة ملتصقة تماماً بالكتابة */
            gap: -1.2rem; 
        }

        .logo-as-g {
            width: 105px; 
            height: 105px;
            object-fit: contain;
            /* محاذاة بصرية دقيقة وإزالة أي فراغ جانبي */
            margin-top: -5px; 
            margin-right: -10px;
            z-index: 10;
        }

        .brand-text-rok {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 5.5rem; 
            line-height: 1;
            letter-spacing: -0.05em;
            color: white;
            position: relative;
            /* سحب النص ليلتصق بالشعار */
            margin-left: -5px;
        }

        .brand-text-full-width {
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            color: #6EEB36;
            margin-top: 10px;
            text-align: center;
            text-transform: uppercase;
            border-top: 1px solid rgba(110, 235, 54, 0.3);
            padding-top: 8px;
        }

        .glow-button {
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(110, 235, 54, 0.3); }
            50% { box-shadow: 0 0 30px rgba(110, 235, 54, 0.6); }
        }

        #dashboardFrame {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 100;
            background: black;
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
            transition: all 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-black text-white antialiased">

    <!-- فيديو الخلفية -->
    <div class="video-wrapper">
        <video id="bgVideo" autoplay loop muted playsinline poster="background.mp4">
            <source src="background.mp4" type="video/mp4">
        </video>
    </div>

    <!-- عنصر الصوت المخفي -->
    <audio id="bgMusic" src="mp3.mp3" preload="auto"></audio>

    <!-- الواجهة الرئيسية -->
    <div id="mainUI" class="mobile-container relative transition-all duration-500">
        
        <!-- حاوية العلامة التجارية -->
        <div class="brand-wrapper">
            <div class="brand-top-row">
                <!-- الشعار ملتصق بـ ROK -->
                <img src="grok.png" alt="G" class="logo-as-g">
                <div class="brand-text-rok">ROK</div>
            </div>
            <div class="brand-text-full-width">
                11.9 REMIX IDE DEV 0.54.0
            </div>
        </div>

        <!-- زر الإجراء الرئيسي -->
        <button id="registerbutton" onclick="handleConfirm()"
                class="glow-button w-full max-w-[280px] bg-[#6EEB36] text-black font-black py-5 rounded-2xl hover:bg-[#5ACC2F] transition duration-150 shadow-xl uppercase tracking-widest text-sm mb-4">
            Confirm & Proceed
        </button>
    </div>

    <!-- إطار لوحة التحكم -->
    <iframe id="dashboardFrame" src="pop.html"></iframe>

    <script type="text/javascript">
        const tg = window.Telegram.WebApp;
        const audio = document.getElementById('bgMusic');

        function initApp() {
            if (tg) {
                tg.ready();
                tg.expand(); 
                
                if (tg.requestFullscreen) {
                    tg.requestFullscreen();
                }

                tg.setHeaderColor('#000000');
                tg.setBackgroundColor('#000000');

                const updateHeight = () => {
                    document.documentElement.style.setProperty('--tg-viewport-height', `${tg.viewportHeight}px`);
                };
                tg.onEvent('viewportChanged', updateHeight);
                updateHeight();
            }
        }

        function handleConfirm() {
            const btn = document.getElementById('registerbutton');
            const mainUI = document.getElementById('mainUI');
            const iframe = document.getElementById('dashboardFrame');
            
            // تشغيل الموسيقى
            if (audio) {
                audio.play().catch(e => console.log("Audio play blocked:", e));
            }

            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            btn.innerHTML = 'LOADING...';
            btn.classList.add('animate-pulse');
            btn.disabled = true;

            setTimeout(() => {
                mainUI.classList.add('fade-out');
                
                setTimeout(() => {
                    mainUI.style.display = 'none';
                    iframe.style.display = 'block';
                }, 500);
            }, 400);
        }

        window.addEventListener('load', () => {
            initApp();
        });
    </script>

</body>
</html>
